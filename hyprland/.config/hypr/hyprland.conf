monitorv2 {
  output = eDP-1
  mode = preferred
  scale = auto
  bitdepth = 10
  cm = edid
  sdr_eotf = 2
}

render {
  cm_auto_hdr = 0
  cm_fs_passthrough = 0
}

input {
  kb_layout = us
    follow_mouse = 0
    touchpad {
      disable_while_typing = true
      natural_scroll = true
      scroll_factor = 1.5
    }
}

general {
  border_size = 1
  gaps_in = 1
  gaps_out = 2
  col.active_border = rgba(bb9af7ff)
  col.inactive_border = rgba(595959aa)
  layout = master
  resize_on_border = true
}

decoration {
  rounding = 3
  dim_special = 0.3
  blur {
    enabled = false 
  }
  shadow {
    enabled = false
  }
}

animations {
  enabled = true
  animation = windows, 1, 4, default, popin 80%
  animation = fade, 1, 4, default
  animation = workspaces, 1, 2, default, slide
}

master {
  new_status = master
  new_on_top = true
}

misc {
  disable_hyprland_logo = true
  animate_manual_resizes = true
  animate_mouse_windowdragging = true
}

#-------  env vars  -------#
# XDG config
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_CACHE_HOME,/tmp
# QT config
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORMTHEME_QT6,qt6ct
# ime config
env = INPUT_METHOD,fcitx
env = QT_IM_MODULE,fcitx
env = SDL_IM_MODULE,fcitx
env = GLFW_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
# cursor theme
env = HYPRCURSOR_THEME,Ano
env = XCURSOR_THEME,Ano
env = HYPRCURSOR_SIZE,24
env = XCURSOR_SIZE,24
# default terminal
env = TERMINAL,kitty
# default browser
env = BROWSER,google-chrome-stable
env = CHROME_EXECUTABLE,google-chrome-stable
#-------  auto run  -------#

# xwayland
exec-once = systemctl --user start xsettingsd.service && echo "Xft.dpi: 192" | xrdb -merge && xprop -root -format _XWAYLAND_GLOBAL_OUTPUT_SCALE 32c -set _XWAYLAND_GLOBAL_OUTPUT_SCALE 2
# authentication agent
exec-once = systemctl --user start hyprpolkitagent
# ime
exec-once = fcitx5 -d
# auto mount
exec-once = udiskie &
# bat cache build
exec-once = bat cache --build&>/dev/null
# quickshell
exec-once = dms run

#-------  keybind  -------#

# mod key
$mainMod = SUPER
$shiftMod = SUPERSHIFT
$altMod = SUPERALT
$ctrlMod = SUPERCTRL

# useful software
bind = $mainMod, C, exec, kitty                              # terminal
bind = $mainMod, W, exec, google-chrome-stable               # web browser
bind = $mainMod, X, exec, kitty nvim                         # editor
bind = $mainMod, S, exec, dms ipc call spotlight toggle      # launcher
bind = $mainMod, V, exec, dms ipc call clipboard toggle      # clipboard
bind = $mainMod, D, exec, dms ipc call notifications toggle  # notification center
bind = $mainMod, L, exec, dms ipc call lock lock             # lock screen
bind = $mainMod, I, exec, dms ipc call settings toggle       # settings

# basic action
bind = $mainMod, A, fullscreenstate, 2 0  # fullscreen
bind = $mainMod, Q, killactive            # quit window
bind = $mainMod, Z, togglefloating        # float window

# mouse action
bindm = $mainMod, mouse:272, movewindow
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# window action
bind = $mainMod, return, layoutmsg, swapwithmaster    # swap with master
bind = $mainMod, K, layoutmsg, cycleprev              # focus prev
bind = $mainMod, J, layoutmsg, cyclenext              # focus next
bind = $mainMod, left, layoutmsg, cycleprev              # focus prev
bind = $mainMod, right, layoutmsg, cyclenext              # focus next
bind = $mainMod, up, layoutmsg, cycleprev              # focus prev
bind = $mainMod, down, layoutmsg, cyclenext              # focus next

# workspace action
#goto number
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 0, togglespecialworkspace,
#move to number
bind = $ctrlMod, 1, movetoworkspace, 1
bind = $ctrlMod, 2, movetoworkspace, 2
bind = $ctrlMod, 3, movetoworkspace, 3
bind = $ctrlMod, 4, movetoworkspace, 4
bind = $ctrlMod, 5, movetoworkspace, 5
bind = $ctrlMod, 0, movetoworkspace, special
#show workspace grid
bind = $mainMod, tab, exec, dms ipc call hypr toggleOverview

# audio action
bind = , xf86audiomute, exec, dms ipc call audio mute
bind = , xf86audiomicmute, exec, dms ipc call audio micmute
bind = CTRL, f1, exec, dms ipc call audio mute
binde = , xf86audiolowervolume, exec, dms ipc call audio decrement 2
binde = CTRL, f2, exec, dms ipc call audio decrement 2
binde = , xf86audioraisevolume, exec, dms ipc call audio increment 2
binde = CTRL, f3, exec, dms ipc call audio increment 2

# brightness action
binde = , xf86monbrightnessup, exec, dms ipc call brightness increment 5 ""
binde = , xf86monbrightnessdown, exec, dms ipc call brightness decrement 5 ""

# screenshot
bind = , print, exec, screenshot copy output
bind = $shiftMod, S, exec, screenshot copysave area $HOME/Pictures/Screenshots

# music
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next
bind = CTRL, f4, exec, bash $HOME/.local/share/scripts/user/toggle-waylyrics
bind = CTRL, f5, exec, dms ipc call mpris previous
bind = CTRL, f6, exec, dms ipc call mpris next
bind = CTRL, f7, exec, dms ipc call mpris playPause

# calculator
bind = , XF86Calculator, exec, kitty python

# color picker
bind = , XF86Favorites, exec, bash $HOME/.local/share/scripts/user/pick-color

#-------  window rules -------#
#float
windowrule = match:float true, border_size 0

#editor
windowrule = match:class kitty, opacity 0.95
windowrule = match:class Code, opacity 0.95
windowrule = match:class (.*)(jetbrains)(.*)$, opacity 0.95

#waylyrics
windowrule = match:class (.*)(waylyrics)(.*)$, no_focus on
windowrule = match:class (.*)(waylyrics)(.*)$, float on
windowrule = match:class (.*)(waylyrics)(.*)$, pin on
windowrule = match:class (.*)(waylyrics)(.*)$, size 1000 140
windowrule = match:class (.*)(waylyrics)(.*)$, move 220 760

